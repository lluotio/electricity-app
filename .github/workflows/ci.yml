name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      # FRONTEND
      - name: Install frontend deps
        working-directory: frontend
        run: npm ci

      - name: Lint
        run: npx biome check .

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      # BACKEND
      - name: Install backend deps
        working-directory: backend
        run: npm ci